data: data/allMeSH_2022.json
output_dir: output/scibert
max_articles: 100000
min_label_count: 100
val_split: 0.1
test_split: 0.1

# Model
model_name: allenai/scibert_scivocab_uncased
max_length: 128

# Training
epochs: 30
early_stopping_patience: 5
warmup_ratio: 0.1
batch_size: 32
lr: 2.0e-5
threshold: 0.5
dropout: 0.1
